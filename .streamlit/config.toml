[server]
# Keep-alive connections to avoid creating a new socket per request
enableCORS = false
enableXsrfProtection = false

# Increase WebSocket message size limit
maxMessageSize = 500

# Increase upload limit
maxUploadSize = 200

# Disable telemetry (reduces overhead)
[browser]
gatherUsageStats = false

[runner]
# Use a fast runner
fastReruns = true
